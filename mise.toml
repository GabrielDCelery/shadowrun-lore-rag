[tools]
python = "3.12"
uv = "0.9.26"

[env]
_.file = { path = '.env' }

[tasks."image:build"]
description = "Build Docker image for homelab registry"
run = "docker build -t shadowrun-rag:latest ."

[tasks."image:push"]
description = "Push image to local homelab registry"
run = """
docker tag shadowrun-rag:latest $REGISTRY_HOST/homelab/shadowrun-rag:latest
docker push $REGISTRY_HOST/homelab/shadowrun-rag:latest
"""

[tasks."image:publish"]
description = "Build and push image to local homelab registry"
run = [{ task = "image:build" }, { task = "image:push" }]

[tasks."image:validate"]
description = "Check image exists in local homelab registry"
run = "curl --silent $REGISTRY_HOST/v2/homelab/shadowrun-rag/tags/list"

[tasks."pipeline:1-normalise"]
description = "Normalise PDF filenames from pdfs_raw/ to pdfs_normalised/"
run = "ssh $SHDWRN_REMOTE_USER@$SHDWRN_REMOTE_HOST docker exec -t shadowrun-rag uv run python src/normalise_pdf_filenames.py"

[tasks."pipeline:2-convert"]
description = "Convert normalised PDFs to markdown"
run = "ssh $SHDWRN_REMOTE_USER@$SHDWRN_REMOTE_HOST docker exec -t shadowrun-rag uv run python src/convert_pdfs_to_markdown.py"

[tasks."pipeline:3-clean"]
description = "Clean extracted markdown files (fix OCR artifacts, normalise tables)"
run = "ssh $SHDWRN_REMOTE_USER@$SHDWRN_REMOTE_HOST docker exec -t shadowrun-rag uv run python src/clean_markdown.py"

[tasks."pipeline:4-strip-toc"]
description = "Strip table of contents, credits and index sections from cleaned markdown"
run = "ssh $SHDWRN_REMOTE_USER@$SHDWRN_REMOTE_HOST docker exec -t shadowrun-rag uv run python src/strip_toc.py"

[tasks."pipeline:5-embed"]
description = "Create embeddings from markdown files"
run = "ssh $SHDWRN_REMOTE_USER@$SHDWRN_REMOTE_HOST docker exec -t shadowrun-rag uv run python src/create_embeddings.py"

[tasks."debug:gpu-watch"]
description = "Watch GPU utilisation in real time"
run = "ssh -t $SHDWRN_REMOTE_USER@$SHDWRN_REMOTE_HOST watch -n 2 nvidia-smi"

[tasks."debug:query"]
description = "Query the RAG system — pass your question as an argument e.g. mise run debug:query -- 'What is Tir Tairngire'"
run = "ssh $SHDWRN_REMOTE_USER@$SHDWRN_REMOTE_HOST docker exec -t shadowrun-rag uv run python src/query.py \"${@}\""

[tasks."debug:evaluate-pass1"]
description = "Generate RAG answers for all test queries (pass 1) — saves to /data/evals/ on remote"
run = "ssh $SHDWRN_REMOTE_USER@$SHDWRN_REMOTE_HOST docker exec -t shadowrun-rag uv run python src/evaluate.py --pass1 tests/rag_queries.md"

[tasks."debug:evaluate-pass2"]
description = "Judge saved answers with LLM judge (pass 2)"
usage = 'arg "<filename>" help="Answers filename from pass 1 e.g. 20260425_193000_answers.json"'
run = "ssh $SHDWRN_REMOTE_USER@$SHDWRN_REMOTE_HOST docker exec -t shadowrun-rag uv run python src/evaluate.py --pass2 /data/evals/${usage_filename}"

[tasks."debug:pull-markdown"]
description = "Pull processed markdown files from the homelab"
run = """
scp -r "$SHDWRN_REMOTE_USER@$SHDWRN_REMOTE_HOST:/srv/shadowrun-rag/markdown_clean/*.md" ./data/markdown_clean/
scp -r "$SHDWRN_REMOTE_USER@$SHDWRN_REMOTE_HOST:/srv/shadowrun-rag/markdown_extracted/*.md" ./data/markdown_extracted/
scp -r "$SHDWRN_REMOTE_USER@$SHDWRN_REMOTE_HOST:/srv/shadowrun-rag/markdown_stripped/*.md" ./data/markdown_stripped/
"""

[tasks."debug:pull-evals"]
description = "Pull evaluation results (answers + scores) from the homelab"
run = """
scp -r "$SHDWRN_REMOTE_USER@$SHDWRN_REMOTE_HOST:/srv/shadowrun-rag/evals/." ./data/evals/
"""
